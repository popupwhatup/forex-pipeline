services:
  web:
      image: nginx
      ports:
        - "8080:80"

  cache:
    image: redis

  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: forex1234
      POSTGRES_USER: forex
      POSTGRES_DB: forexdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:

